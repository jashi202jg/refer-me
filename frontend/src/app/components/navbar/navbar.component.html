<nav class="navbar">
  <div class="nav-container">
    <div class="nav-brand">
      <a routerLink="/dashboard">ReferMe</a>
    </div>

    <div class="nav-links-right">
      <div class="nav-links" *ngIf="authService.isLoggedIn">
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
        <a routerLink="/jobs" routerLinkActive="active">Jobs</a>
        <a routerLink="/post-job" routerLinkActive="active" *ngIf="authService.isReferrer">Post Job</a>
        <a routerLink="/applications" routerLinkActive="active">Applications</a>
        
        <div class="user-menu">
          <span class="user-name">{{ currentUser?.first_name }} {{ currentUser?.last_name }}</span>
          <span class="user-badge" [class.badge-referrer]="currentUser?.user_type === 'referrer'" [class.badge-candidate]="currentUser?.user_type === 'candidate'">
            {{ currentUser?.user_type }}
          </span>
          <button class="btn-logout" (click)="logout()">Logout</button>
        </div>
      </div>

      <div class="nav-links" *ngIf="!authService.isLoggedIn">
        <a routerLink="/login" routerLinkActive="active">Login</a>
        <a routerLink="/signup" routerLinkActive="active" class="btn-signup">Sign Up</a>
      </div>

      <!-- Notifications Dropdown -->
      <div class="notification-wrapper" *ngIf="authService.isLoggedIn">
        <button type="button" class="btn-notification" (click)="toggleNotifications()" title="Notifications">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bell-icon">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path>
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path>
          </svg>
          <span class="notification-badge" *ngIf="unreadCount > 0">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
        </button>

        <div class="notification-dropdown" *ngIf="showNotificationsDropdown">
          <div class="dropdown-header">
            <h4>Notifications</h4>
            <div class="dropdown-actions" *ngIf="notifications.length > 0">
              <button type="button" class="btn-text" (click)="markAllRead()">Mark all read</button>
              <button type="button" class="btn-text" (click)="clearNotifications()">Clear</button>
            </div>
          </div>

          <div class="dropdown-body">
            <div *ngIf="notifications.length === 0" class="empty-notifications">
              <p>No notifications yet</p>
            </div>
            <div 
              *ngFor="let notif of notifications" 
              class="notification-item" 
              [class.unread]="!notif.isRead"
              (click)="onNotificationClick(notif)"
            >
              <div class="notif-content">
                <span class="notif-title">{{ notif.title }}</span>
                <p class="notif-message">{{ notif.message }}</p>
                <span class="notif-time">{{ notif.timestamp | date:'shortTime' }}</span>
              </div>
              <span class="unread-dot" *ngIf="!notif.isRead"></span>
            </div>
          </div>
        </div>
      </div>

      <button type="button" class="theme-toggle-switch" (click)="toggleTheme()" [class.is-dark]="themeService.isDarkMode" [title]="themeService.isDarkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'" aria-label="Toggle theme">
        <span class="toggle-track">
          <svg class="toggle-icon sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
          </svg>
          <svg class="toggle-icon moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
          </svg>
          <span class="toggle-thumb"></span>
        </span>
      </button>
    </div>
  </div>
</nav>
