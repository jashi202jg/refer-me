<div class="modal-overlay" *ngIf="modalState?.isOpen" (click)="onCancel()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-icon-wrapper" [class.danger]="modalState?.type === 'danger'" [class.alert]="modalState?.type === 'alert'" [class.confirm]="modalState?.type === 'confirm'">
        <svg *ngIf="modalState?.type === 'danger'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <svg *ngIf="modalState?.type === 'confirm'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <svg *ngIf="modalState?.type === 'alert'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <h3>{{ modalState?.title }}</h3>
    </div>
    <div class="modal-body">
      <p>{{ modalState?.message }}</p>
    </div>
    <div class="modal-footer">
      <button *ngIf="modalState?.type !== 'alert'" type="button" class="btn-cancel" (click)="onCancel()">
        {{ modalState?.cancelText }}
      </button>
      <button type="button" class="btn-confirm" [class.btn-danger-confirm]="modalState?.type === 'danger'" (click)="onConfirm()">
        {{ modalState?.confirmText }}
      </button>
    </div>
  </div>
</div>
